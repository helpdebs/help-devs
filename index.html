<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Sora', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .scanline {
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,212,255,0.015) 2px,
        rgba(0,212,255,0.015) 4px
      );
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
  }

  .hdr {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1rem;
    margin-bottom: 1.5rem;
    gap: 1rem;
  }

  .logo {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--accent);
    letter-spacing: .1em;
  }

  .logo span {
    color: var(--muted);
  }

  .stats-row {
    display: flex;
    gap: .75rem;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  .screen {
    display: none;
  }

  .screen.active {
    display: block;
    animation: fade .25s ease;
  }

  @keyframes fade {
    from {
      opacity: 0;
      transform: translateY(8px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.5rem;
    max-width: 450px;
    margin: 2rem auto;
  }

  .auth-card h1 {
    font-size: 26px;
    margin-bottom: .4rem;
  }

  .auth-card p {
    color: var(--muted);
    line-height: 1.6;
    font-size: 13px;
    margin-bottom: 1rem;
  }

  .auth-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }

  .auth-field label {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    text-transform: uppercase;
  }

  .auth-input {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: .9rem 1rem;
    color: var(--text);
    outline: none;
    font-family: var(--sans);
  }

  .auth-input:focus {
    border-color: var(--accent);
  }

  .action-btn {
    width: 100%;
    border: none;
    background: var(--accent);
    color: #000;
    padding: .9rem;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--sans);
  }

  .welcome-badge {
    background:
      linear-gradient(
        135deg,
        rgba(0,212,255,.1),
        rgba(124,58,237,.1)
      );

    border: 1px solid rgba(0,212,255,.3);
    border-radius: 14px;
    padding: 2rem;
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .welcome-badge h1 {
    font-size: 30px;
    margin-bottom: .6rem;
  }

  .welcome-badge em {
    color: var(--accent);
    font-style: normal;
  }

  .welcome-badge p {
    color: var(--muted);
    line-height: 1.7;
    font-size: 14px;
  }

  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .mode-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.2rem;
    cursor: pointer;
    transition: .2s;
  }

  .mode-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
  }

  .mode-card .icon {
    font-size: 30px;
    margin-bottom: .5rem;
  }

  .mode-card h3 {
    margin-bottom: 4px;
  }

  .mode-card p {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  @media (max-width: 600px) {
    .mode-grid {
      grid-template-columns: 1fr;
    }

    .hdr {
      flex-direction: column;
      align-items: flex-start;
    }
  }
</style>
</head>

<body>

<div class="scanline"></div>

<div id="app">

<header class="hdr">
  <div class="logo">TECH<span>.</span>VOCAB</div>

  <div class="stats-row">
    <div class="stat-chip">
      <div class="dot"></div>
      <span id="xp-count">0</span> XP
    </div>
  </div>
</header>

<div class="screen active" id="screen-auth">

  <div class="auth-card">

    <h1>Login</h1>

    <p>
      Entre com email e senha para salvar seu progresso.
    </p>

    <div class="auth-field">
      <label>Email</label>
      <input
        class="auth-input"
        id="auth-email"
        type="email"
      >
    </div>

    <div class="auth-field">
      <label>Password</label>
      <input
        class="auth-input"
        id="auth-password"
        type="password"
      >
    </div>

    <button
      class="action-btn"
      onclick="login()"
    >
      Enter
    </button>

  </div>

</div>

<div class="screen" id="screen-home">

  <div class="welcome-badge">
    <h1>
      Level up your <em>Tech English</em>
    </h1>

    <p>
      Vocabulário real de dev, UX, produto e tecnologia.
    </p>
  </div>

  <div class="mode-grid">

    <div class="mode-card">
      <div class="icon">🃏</div>
      <h3>Flashcards</h3>
      <p>Aprenda termos técnicos rapidamente.</p>
    </div>

    <div class="mode-card">
      <div class="icon">🎯</div>
      <h3>Quiz</h3>
      <p>Treine em contexto real.</p>
    </div>

  </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://pgdanuifukzisyyummpz.supabase.co";

const SUPABASE_KEY =
"sb_publishable_81NM6F08rsXXSCgjWl4iSg_v99cdVpo";

const supabaseClient =
window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

async function login() {

  const email =
    document.getElementById('auth-email').value;

  const password =
    document.getElementById('auth-password').value;

  const { data, error } =
    await supabaseClient.auth.signInWithPassword({
      email,
      password
    });

  if (error) {
    alert(error.message);
    return;
  }

  document
    .getElementById('screen-auth')
    .classList.remove('active');

  document
    .getElementById('screen-home')
    .classList.add('active');
}

</script>

</body>
</html>
